name: Build Push and Deploy Microservices

on:
  push:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: anildevopsr15

jobs:

  build-push-deploy:

    runs-on: ubuntu-latest

    steps:

    # ==========================================================
    # CHECKOUT SOURCE CODE
    # ==========================================================
    - name: Checkout Source Code
      uses: actions/checkout@v4


    # ==========================================================
    # SETUP .NET
    # ==========================================================
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'


    # ==========================================================
    # DOCKER LOGIN
    # ==========================================================
    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}


    # ==========================================================
    # CUSTOMER SERVICE
    # ==========================================================
    - name: Restore Customer Service
      run: |
        dotnet restore src/Services/Customer/Customer.API/Customer.API.csproj

    - name: Build Customer Service
      run: |
        dotnet build src/Services/Customer/Customer.API/Customer.API.csproj \
        --configuration Release \
        --no-restore

    - name: Build Customer Docker Image
      run: |
        docker build \
        -t ${{ env.IMAGE_NAMESPACE }}/customer-api:${{ github.sha }} \
        -f src/Services/Customer/Customer.API/Dockerfile .

    - name: Push Customer Docker Image
      run: |
        docker push ${{ env.IMAGE_NAMESPACE }}/customer-api:${{ github.sha }}


    # ==========================================================
    # ACCOUNT SERVICE
    # ==========================================================
    - name: Restore Account Service
      run: |
        dotnet restore src/Services/Account/Account.API/Account.API.csproj

    - name: Build Account Service
      run: |
        dotnet build src/Services/Account/Account.API/Account.API.csproj \
        --configuration Release \
        --no-restore

    - name: Build Account Docker Image
      run: |
        docker build \
        -t ${{ env.IMAGE_NAMESPACE }}/account-api:${{ github.sha }} \
        -f src/Services/Account/Account.API/Dockerfile .

    - name: Push Account Docker Image
      run: |
        docker push ${{ env.IMAGE_NAMESPACE }}/account-api:${{ github.sha }}


    # ==========================================================
    # TRANSACTION SERVICE
    # ==========================================================
    - name: Restore Transaction Service
      run: |
        dotnet restore src/Services/Transaction/Transaction.API/Transaction.API.csproj

    - name: Build Transaction Service
      run: |
        dotnet build src/Services/Transaction/Transaction.API/Transaction.API.csproj \
        --configuration Release \
        --no-restore

    - name: Build Transaction Docker Image
      run: |
        docker build \
        -t ${{ env.IMAGE_NAMESPACE }}/transaction-api:${{ github.sha }} \
        -f src/Services/Transaction/Transaction.API/Dockerfile .

    - name: Push Transaction Docker Image
      run: |
        docker push ${{ env.IMAGE_NAMESPACE }}/transaction-api:${{ github.sha }}


    # ==========================================================
    # SETUP SSH
    # ==========================================================
    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa


    # ==========================================================
    # ADD EC2 TO KNOWN HOSTS
    # ==========================================================
    - name: Add EC2 to Known Hosts
      run: |
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts


    # ==========================================================
    # DEPLOY TO KUBERNETES
    # ==========================================================
    - name: Deploy to Kubernetes
      run: |

        ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'

          # ======================================================
          # CLONE REPOSITORY IF NOT EXISTS
          # ======================================================

          if [ ! -d "DevOps-8-30Batch" ]; then
            git clone https://github.com/anilkumar321456/DevOps-8-30Batch.git
          fi

          # ======================================================
          # GO TO PROJECT DIRECTORY
          # ======================================================

          cd DevOps-8-30Batch

          # ======================================================
          # PULL LATEST CODE
          # ======================================================

          git pull origin main


          # ======================================================
          # APPLY KUBERNETES YAML FILES
          # ======================================================

          kubectl apply -f "src/apiVersion: apps/customer-api-deployment.yaml"

          kubectl apply -f "src/apiVersion: apps/account-api-deployment.yaml"

          kubectl apply -f "src/apiVersion: apps/transaction-api-deployment.yaml"


          # ======================================================
          # UPDATE IMAGES
          # ======================================================

          kubectl set image deployment/customer-api \
          customer-api=anildevopsr15/customer-api:${{ github.sha }}

          kubectl set image deployment/account-api \
          account-api=anildevopsr15/account-api:${{ github.sha }}

          kubectl set image deployment/transaction-api \
          transaction-api=anildevopsr15/transaction-api:${{ github.sha }}


          # ======================================================
          # CHECK ROLLOUT STATUS
          # ======================================================

          kubectl rollout status deployment/customer-api

          kubectl rollout status deployment/account-api

          kubectl rollout status deployment/transaction-api


          # ======================================================
          # VERIFY DEPLOYMENTS
          # ======================================================

          kubectl get deployments

          kubectl get pods

          kubectl get svc

        EOF
