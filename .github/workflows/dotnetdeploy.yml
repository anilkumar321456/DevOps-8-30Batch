name: Build and Push Microservices

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: anildevopsr15/devops-online

jobs:

  # ==========================================================
  # CUSTOMER SERVICE
  # ==========================================================
  customer-service:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Customer Service
        run: |
          dotnet restore src/Services/Customer/Customer.API/Customer.API.csproj

      - name: Build Customer Service
        run: |
          dotnet build src/Services/Customer/Customer.API/Customer.API.csproj \
          --configuration Release \
          --no-restore

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Customer Docker Image
        run: |
          docker build -t ${{ env.IMAGE_NAMESPACE }}/customer-api:${{ github.sha }} \
          -f src/Services/Customer/Customer.API/Dockerfile .

      - name: Push Customer Docker Image
        run: |
          docker push ${{ env.IMAGE_NAMESPACE }}/customer-api:${{ github.sha }}



  # ==========================================================
  # ACCOUNT SERVICE
  # ==========================================================
  account-service:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

