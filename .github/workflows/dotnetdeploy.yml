          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Account Docker Image
        run: |
          docker build -t ${{ env.IMAGE_NAMESPACE }}/account-api:${{ github.sha }} \
          -f src/Services/Account/Account.API/Dockerfile .

      - name: Push Account Docker Image
        run: |
          docker push ${{ env.IMAGE_NAMESPACE }}/account-api:${{ github.sha }}



  # ==========================================================
  # TRANSACTION SERVICE
  # ==========================================================
  transaction-service:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

