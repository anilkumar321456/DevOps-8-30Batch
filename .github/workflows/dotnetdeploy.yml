      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Transaction Docker Image
        run: |
          docker build -t ${{ env.IMAGE_NAMESPACE }}/transaction-api:${{ github.sha }} \
          -f src/Services/Transaction/Transaction.API/Dockerfile .

      - name: Push Transaction Docker Image
        run: |
          docker push ${{ env.IMAGE_NAMESPACE }}/transaction-api:${{ github.sha }}
